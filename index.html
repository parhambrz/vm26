<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card2: #0f1c33;
    --line: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --green-bg: rgba(16,185,129,.22);
    --amber-bg: rgba(245,158,11,.28);
    --win: rgba(5,150,105,.6);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.4 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  .wrap { max-width: 1400px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 22px; text-align: center; margin: 0 0 4px; }
  h2 { font-size: 18px; text-align: center; margin: 0 0 4px; }
  .subtitle { text-align: center; color: var(--muted); font-size: 12px; margin: 0 0 16px; }
  .toolbar { display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; margin: 0 0 8px; }
  button.btn {
    background: var(--card); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 12px; font: inherit; cursor: pointer;
  }
  button.btn:hover { border-color: var(--muted); }
  button.btn:disabled { opacity: .55; cursor: default; }
  input.keyfield {
    background: var(--card2); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 10px; font: inherit; width: 200px; max-width: 50vw;
  }
  .fetch-status { text-align: center; color: var(--muted); font-size: 11px; min-height: 16px; margin: 0 0 16px; }
  .champion { text-align: center; color: #34d399; font-weight: 700; margin: 0 0 16px; min-height: 20px; }

  /* groups */
  .groups { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 1024px) { .groups { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 720px)  { .groups { grid-template-columns: repeat(2, 1fr); } }
  .group { background: var(--card); border-radius: 8px; padding: 10px 12px; font-size: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
  .group-head {
    display: flex; justify-content: space-between; align-items: center; width: 100%;
    background: none; border: 0; color: var(--text); font: 600 13px system-ui; cursor: pointer; padding: 0 0 6px;
  }
  .group-head .hint { color: var(--muted); font-weight: 400; font-size: 11px; }
  .standing { display: flex; justify-content: space-between; padding: 3px 6px; border-radius: 4px; }
  .standing .stat { color: var(--muted); font-variant-numeric: tabular-nums; }
  .q1 { background: var(--green-bg); }
  .q3 { background: var(--amber-bg); }
  .third-rank { font-size: 10px; color: var(--muted); font-weight: 500; margin-left: 5px; padding: 0 4px; border-radius: 999px; border: 1px solid var(--line); }
  .third-rank.in { color: #fbbf24; border-color: rgba(251,191,36,.45); }
  .fixture { display: flex; align-items: center; justify-content: space-between; gap: 4px; padding: 3px 0; }
  .fixture-date { color: var(--muted); font-size: 10px; margin: 6px 0 1px; text-align: center; }
  .fixture .t { width: 92px; }
  .fixture .t.left { text-align: right; }
  .fixture .dash { color: var(--muted); }
  input.score {
    width: 30px; text-align: center; background: var(--card2); border: 1px solid var(--line);
    border-radius: 4px; color: var(--text); font: inherit; padding: 2px 0;
  }
  input.score.locked { border-color: var(--win); background: rgba(5,150,105,.18); cursor: not-allowed; opacity: .9; }

  /* bracket */
  .bracket-section { margin-top: 36px; }
  .bracket { display: flex; justify-content: center; align-items: stretch; gap: 10px; overflow-x: auto; padding-bottom: 16px; }
  .half { display: flex; gap: 10px; }
  .roundcol { display: flex; flex-direction: column; }
  .col-label { text-align: center; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .col-matches { display: flex; flex-direction: column; gap: 10px; justify-content: space-around; flex: 1; }
  .final-col { display: flex; flex-direction: column; justify-content: center; }
  .match { background: var(--card); border-radius: 6px; width: 124px; box-shadow: 0 1px 2px rgba(0,0,0,.4); overflow: hidden; }
  .match-date { font-size: 9px; color: var(--muted); text-align: center; padding: 2px 4px 0; letter-spacing: .02em; }
  .match-row { display: flex; align-items: center; justify-content: space-between; gap: 5px; padding: 4px 7px; font-size: 11px; }
  .match-row .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1 1 auto; }
  .match-row.winner { background: var(--win); font-weight: 600; }
  .match-row input.score { width: 24px; flex: 0 0 auto; }
</style>
</head>
<body>
<div class="wrap">
  <h1>FIFA World Cup 2026 — Interactive Bracket</h1>
  <p class="subtitle">
    Played games are locked to their real results; unplayed games are predicted from team strength (2026 odds) and stay editable.
    <br>Green = top two qualify · Amber = best-eight third place.
  </p>
  <div class="toolbar">
    <button class="btn" id="resetBtn">Reset predictions</button>
    <button class="btn" id="fetchBtn">Fetch live results</button>
    <input class="keyfield" id="apiKey" type="text" placeholder="TheSportsDB key (3 = demo)" autocomplete="off" spellcheck="false" />
  </div>
  <div class="fetch-status" id="fetchStatus"></div>
  <div class="champion" id="champion"></div>
  <div id="app"></div>
</div>

<script>
(function(){
  "use strict";

  // -------------------------------

  var groups = [

    { name:"B", teams:["Canada","Switzerland","Qatar","Bosnia"] },

  // -------------------------------

  // -------------------------------
  var RATINGS = {
    "Mexico":78,"South Africa":64,"South Korea":72,"Czechia":73,
    "Canada":72,"Switzerland":77,"Qatar":62,"Bosnia":70,
    "Brazil":90,"Morocco":80,"Scotland":71,"Haiti":58,
    "USA":75,"Australia":70,"Paraguay":69,"Turkiye":76,
    "Germany":87,"Ecuador":74,"Ivory Coast":72,"Curacao":56,

  };

  // -------------------------------

  // -------------------------------
  var FLAGS = {
    "Mexico":"\ud83c\uddf2\ud83c\uddfd","South Africa":"\ud83c\uddff\ud83c\udde6","South Korea":"\ud83c\uddf0\ud83c\uddf7","Czechia":"\ud83c\udde8\ud83c\uddff",
    "Canada":"\ud83c\udde8\ud83c\udde6","Switzerland":"\ud83c\udde8\ud83c\udded","Qatar":"\ud83c\uddf6\ud83c\udde6","Bosnia":"\ud83c\udde7\ud83c\udde6",
    "Brazil":"\ud83c\udde7\ud83c\uddf7","Morocco":"\ud83c\uddf2\ud83c\udde6","Scotland":"\ud83c\udff4\udb40\udc67\udb40\udc62\udb40\udc73\udb40\udc63\udb40\udc74\udb40\udc7f","Haiti":"\ud83c\udded\ud83c\uddf9",
    "USA":"\ud83c\uddfa\ud83c\uddf8","Australia":"\ud83c\udde6\ud83c\uddfa","Paraguay":"\ud83c\uddf5\ud83c\uddfe","Turkiye":"\ud83c\uddf9\ud83c\uddf7",
    "Germany":"\ud83c\udde9\ud83c\uddea","Ecuador":"\ud83c\uddea\ud83c\udde8","Ivory Coast":"\ud83c\udde8\ud83c\uddee","Curacao":"\ud83c\udde8\ud83c\uddfc",
    "Netherlands":"\ud83c\uddf3\ud83c\uddf1","Japan":"\ud83c\uddef\ud83c\uddf5","Sweden":"\ud83c\uddf8\ud83c\uddea","Tunisia":"\ud83c\uddf9\ud83c\uddf3",
    "Belgium":"\ud83c\udde7\ud83c\uddea","Iran":"\ud83c\uddee\ud83c\uddf7","Egypt":"\ud83c\uddea\ud83c\uddec","New Zealand":"\ud83c\uddf3\ud83c\uddff",
    "Spain":"\ud83c\uddea\ud83c\uddf8","Uruguay":"\ud83c\uddfa\ud83c\uddfe","Saudi Arabia":"\ud83c\uddf8\ud83c\udde6","Cape Verde":"\ud83c\udde8\ud83c\uddfb",
    "France":"\ud83c\uddeb\ud83c\uddf7","Senegal":"\ud83c\uddf8\ud83c\uddf3","Iraq":"\ud83c\uddee\ud83c\uddf6","Norway":"\ud83c\uddf3\ud83c\uddf4",
    "Argentina":"\ud83c\udde6\ud83c\uddf7","Algeria":"\ud83c\udde9\ud83c\uddff","Austria":"\ud83c\udde6\ud83c\uddf9","Jordan":"\ud83c\uddef\ud83c\uddf4",
    "Portugal":"\ud83c\uddf5\ud83c\uddf9","DR Congo":"\ud83c\udde8\ud83c\udde9","Uzbekistan":"\ud83c\uddfa\ud83c\uddff","Colombia":"\ud83c\udde8\ud83c\uddf4",
    "England":"\ud83c\udff4\udb40\udc67\udb40\udc62\udb40\udc65\udb40\udc6e\udb40\udc67\udb40\udc7f","Croatia":"\ud83c\udded\ud83c\uddf7","Ghana":"\ud83c\uddec\ud83c\udded","Panama":"\ud83c\uddf5\ud83c\udde6"
  };
  // Team name with its flag prefixed (for display only).
  function teamLabel(name){
    if (name == null) return "\u2014";
    var f = FLAGS[name];
    return (f ? f + " " : "") + name;
  }
  // REAL RESULTS (2026 World Cup, source: Wikipedia)
  // Keyed by group -> row index in buildGroupMatches order:
  //  0:t0-t1  1:t2-t3  2:t0-t2  3:t1-t3  4:t0-t3  5:t1-t2
  // Only matchdays 1-2 are complete as of June 23, 2026.
  // -------------------------------
  var RESULTS = {
    A:{0:[2,0],1:[2,1],2:[1,0],3:[1,1]},
    B:{2:[6,0],3:[4,1],4:[1,1],5:[1,1]},
    C:{0:[1,1],1:[1,0],4:[3,0],5:[1,0]},
    D:{0:[2,0],1:[1,0],2:[4,1],3:[2,0]},
    E:{2:[2,1],3:[0,0],4:[7,1],5:[0,1]},
    F:{0:[2,2],1:[5,1],2:[5,1],3:[4,0]},
    G:{0:[0,0],1:[3,1],2:[1,1],3:[2,2]},
    H:{2:[4,0],3:[2,2],4:[0,0],5:[1,1]},
    I:{0:[3,1],1:[1,4],2:[3,0],3:[2,3]},
    J:{0:[3,0],1:[3,1],2:[2,0],3:[2,1]},
    K:{0:[1,1],1:[1,3],2:[5,0],3:[0,1]},
    L:{0:[4,2],1:[1,0],2:[0,0],3:[1,0]}
  };

  // -------------------------------
  // REAL KNOCKOUT RESULTS (2026 World Cup). Keyed by an order-independent
  // team-pair key -> { teamName: goals }. The knockout stage hasn't started
  // yet, so this is empty; the "Fetch live results" button fills it in (and
  // you can hardcode finished KO games here for offline use, just like
  // RESULTS above). A locked KO game overrides its prediction and can't be
  // edited, exactly like a played group game.
  // -------------------------------
  var KO_RESULTS = {};
  function koPairKey(a, b){ return [a, b].slice().sort().join("\u0001"); }
  function koResultFor(a, b){
    if (a == null || b == null) return null;
    var r = KO_RESULTS[koPairKey(a, b)];
    if (!r || r[a] == null || r[b] == null) return null;
    return [r[a], r[b]];
  }

  // -------------------------------
  // KICKOFF SCHEDULE (UTC, source: ESPN). group -> row index -> ISO datetime.
  // Used to display kickoff time (CET) and order group fixtures by date.
  // -------------------------------
  var SCHEDULE = {
    A:{0:"2026-06-11T19:00Z",1:"2026-06-12T02:00Z",2:"2026-06-19T01:00Z",3:"2026-06-18T16:00Z",4:"2026-06-25T01:00Z",5:"2026-06-25T01:00Z"},
    B:{0:"2026-06-24T19:00Z",1:"2026-06-24T19:00Z",2:"2026-06-18T22:00Z",3:"2026-06-18T19:00Z",4:"2026-06-12T19:00Z",5:"2026-06-13T19:00Z"},
    C:{0:"2026-06-13T22:00Z",1:"2026-06-14T01:00Z",2:"2026-06-24T22:00Z",3:"2026-06-24T22:00Z",4:"2026-06-20T00:30Z",5:"2026-06-19T22:00Z"},
    D:{0:"2026-06-19T19:00Z",1:"2026-06-20T03:00Z",2:"2026-06-13T01:00Z",3:"2026-06-14T04:00Z",4:"2026-06-26T02:00Z",5:"2026-06-26T02:00Z"},
    E:{0:"2026-06-25T20:00Z",1:"2026-06-25T20:00Z",2:"2026-06-20T20:00Z",3:"2026-06-21T00:00Z",4:"2026-06-14T17:00Z",5:"2026-06-14T23:00Z"},
    F:{0:"2026-06-14T20:00Z",1:"2026-06-15T02:00Z",2:"2026-06-20T17:00Z",3:"2026-06-21T04:00Z",4:"2026-06-25T23:00Z",5:"2026-06-25T23:00Z"},
    G:{0:"2026-06-21T19:00Z",1:"2026-06-22T01:00Z",2:"2026-06-15T19:00Z",3:"2026-06-16T01:00Z",4:"2026-06-27T03:00Z",5:"2026-06-27T03:00Z"},
    H:{0:"2026-06-27T00:00Z",1:"2026-06-27T00:00Z",2:"2026-06-21T16:00Z",3:"2026-06-21T22:00Z",4:"2026-06-15T16:00Z",5:"2026-06-15T22:00Z"},
    I:{0:"2026-06-16T19:00Z",1:"2026-06-16T22:00Z",2:"2026-06-22T21:00Z",3:"2026-06-23T00:00Z",4:"2026-06-26T19:00Z",5:"2026-06-26T19:00Z"},
    J:{0:"2026-06-17T01:00Z",1:"2026-06-17T04:00Z",2:"2026-06-22T17:00Z",3:"2026-06-23T03:00Z",4:"2026-06-28T02:00Z",5:"2026-06-28T02:00Z"},
    K:{0:"2026-06-17T17:00Z",1:"2026-06-18T02:00Z",2:"2026-06-23T17:00Z",3:"2026-06-24T02:00Z",4:"2026-06-27T23:30Z",5:"2026-06-27T23:30Z"},

  };
  // Format a kickoff ISO datetime as a Central European (Europe/Paris) day +
  // time string, with the correct CET/CEST label for the date.
  function fmtKickoff(iso){
    if (!iso) return "";
    if (/T\d{2}:\d{2}Z$/.test(iso)) iso = iso.replace("Z", ":00Z");
    var d = new Date(iso);
    if (isNaN(d.getTime())) return "";
    var day = d.toLocaleDateString("en-GB", { weekday:"short", day:"2-digit", month:"short", timeZone:"Europe/Paris" });
    var time = d.toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit", hour12:false, timeZone:"Europe/Paris" });
    var tz = "CET";
    try {
      tz = new Intl.DateTimeFormat("en-GB", { timeZone:"Europe/Paris", timeZoneName:"short" })
        .formatToParts(d).filter(function(p){ return p.type === "timeZoneName"; })[0].value;
    } catch(e){}
    return day + " \u00b7 " + time + " " + tz;
  }
  // Row indices of a group, ordered by kickoff date (oldest first).
  function groupOrder(name){
    var order = [0,1,2,3,4,5];
    var sched = SCHEDULE[name] || {};
    return order.slice().sort(function(a, b){
      var ta = sched[a] || "", tb = sched[b] || "";
      if (ta === tb) return a - b;
      return ta < tb ? -1 : 1;
    });
  }

  var KO_SCHEDULE = {

    "r16-0":"2026-07-04T17:00Z","r16-1":"2026-07-04T21:00Z","r16-2":"2026-07-05T20:00Z","r16-3":"2026-07-06T00:00Z",
    "r16-4":"2026-07-06T19:00Z","r16-5":"2026-07-07T00:00Z","r16-6":"2026-07-07T16:00Z","r16-7":"2026-07-07T20:00Z",

  // Compact kickoff label (day + time, no weekday) for the tight bracket cards.
  function fmtKickoffShort(iso){
    if (!iso) return "";
    if (/T\d{2}:\d{2}Z$/.test(iso)) iso = iso.replace("Z", ":00Z");
    var d = new Date(iso);
    if (isNaN(d.getTime())) return "";
    var day = d.toLocaleDateString("en-GB", { day:"2-digit", month:"short", timeZone:"Europe/Paris" });
    var time = d.toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit", hour12:false, timeZone:"Europe/Paris" });
    return day + " " + time;
  }
  // Overwrite only fixtures that have actually been played; leave the

  function isPlayed(group, i){ return !!(RESULTS[group] && RESULTS[group][i]); }
  // Predictions for unplayed games, real results (truth) for played ones.
  function buildMatches(){
    var o = predictedMatches();
    groups.forEach(function(g){
      var res = RESULTS[g.name];
      if (!res) return;
      o[g.name] = o[g.name].map(function(row, i){
        if (!res[i]) return row;
        var nr = row.slice();
        nr[1] = res[i][0];
        nr[2] = res[i][1];
        return nr;
      });
    });
    return o;
  }

  // Deterministic plausible scoreline from the rating gap.
  function predictScore(a, b){
    var ra = RATINGS[a] != null ? RATINGS[a] : 70;
    var rb = RATINGS[b] != null ? RATINGS[b] : 70;
    var diff = ra - rb;
    var ga = Math.max(0, Math.round(1.4 + diff * 0.045));
    var gb = Math.max(0, Math.round(1.4 - diff * 0.045));
    if (Math.abs(diff) >= 8 && ga === gb) { if (diff > 0) ga++; else gb++; }
    return [ga, gb];
  }

  function buildGroupMatches(t){
    function pair(x, y){ var s = predictScore(x, y); return [x, s[0], s[1], y]; }
    return [ pair(t[0],t[1]), pair(t[2],t[3]), pair(t[0],t[2]),

  }

  function predictedMatches(){
    var o = {};
    groups.forEach(function(g){ o[g.name] = buildGroupMatches(g.teams); });
    return o;
  }

  // -------------------------------
  // STANDINGS
  // -------------------------------
  function computeStandings(group, matches){
    var table = {};
    group.teams.forEach(function(t){ table[t] = { team:t, group:group.name, pts:0, gf:0, ga:0 }; });
    matches.forEach(function(m){
      var t1=m[0], g1=m[1], g2=m[2], t2=m[3];
      if (g1 == null || g2 == null) return;
      table[t1].gf += g1; table[t1].ga += g2;
      table[t2].gf += g2; table[t2].ga += g1;
      if (g1 > g2) table[t1].pts += 3;
      else if (g2 > g1) table[t2].pts += 3;
      else { table[t1].pts++; table[t2].pts++; }
    });
    return Object.keys(table).map(function(k){ return table[k]; }).sort(function(a,b){
      return b.pts - a.pts || (b.gf-b.ga) - (a.gf-a.ga) || b.gf - a.gf;
    });
  }

  // -------------------------------
  // ANNEX C — official best-third allocation
  // -------------------------------
  var THIRD_SLOTS = [
    { w:"A", elig:["C","E","F","H","I"] },
    { w:"B", elig:["E","F","G","I","J"] },
    { w:"D", elig:["B","E","F","I","J"] },
    { w:"E", elig:["A","B","C","D","F"] },
    { w:"G", elig:["A","E","H","I","J"] },
    { w:"I", elig:["C","D","F","G","H"] },
    { w:"K", elig:["D","E","I","J","L"] },
    { w:"L", elig:["E","H","I","J","K"] }
  ];

  function assignThirds(thirdGroups){
    var slotGroup = THIRD_SLOTS.map(function(){ return null; });
    function tryAssign(g, seen){
      for (var s = 0; s < THIRD_SLOTS.length; s++){
        if (THIRD_SLOTS[s].elig.indexOf(g) !== -1 && !seen[s]){
          seen[s] = true;
          if (slotGroup[s] === null || tryAssign(slotGroup[s], seen)){
            slotGroup[s] = g; return true;
          }
        }
      }
      return false;
    }
    thirdGroups.forEach(function(g){ tryAssign(g, THIRD_SLOTS.map(function(){ return false; })); });
    var slotOf = {};
    THIRD_SLOTS.forEach(function(slot, s){ slotOf[slot.w] = slotGroup[s]; });
    return slotOf;

        var t = byGroup[g.name][2];
        return { team:t.team, pts:t.pts, gf:t.gf, ga:t.ga, g:g.name };
      })
      .sort(function(a,b){ return b.pts-a.pts || (b.gf-b.ga)-(a.gf-a.ga) || b.gf-a.gf; })
      .slice(0, 8)

    var r16  = pairNext(r32W);

    var seen = {};
    var totalNew = 0, daysFetched = 0, lastFullDay = null, sources = {};

    function step(){
      if (date > today){ return done(); }
      fetchStatus.textContent = "Fetching " + date + "\u2026";
      var espnUrl = "https://site.api.espn.com/apis/site/v2/sports/soccer/" +
                    "fifa.world/scoreboard?dates=" + date.replace(/-/g, "");
      var tsdbUrl = "https://www.thesportsdb.com/api/v1/json/" + encodeURIComponent(key) +
                    "/eventsday.php?d=" + date + "&l=" + TSDB_LEAGUE;
      // Query both sources; tolerate either one failing.
      var pEspn = getJSON(espnUrl).then(function(j){ return j; }, function(){ return null; });
      var pTsdb = getJSON(tsdbUrl).then(function(j){ return j; }, function(){ return null; });
      Promise.all([pEspn, pTsdb]).then(function(arr){
        var espn = arr[0], tsdb = arr[1];
        daysFetched++;
        var dayHadEvents = false, dayAllPlayed = true;

        if (espn && espn.events && espn.events.length){
          sources.espn = true;
          dayHadEvents = true;
          espn.events.forEach(function(e){
            if (!e.status || !e.status.type || e.status.type.state !== "post") dayAllPlayed = false;
          });
          totalNew += applyESPN(espn, seen);
        }
        if (tsdb && tsdb.events && tsdb.events.length){
          sources.tsdb = true;
          totalNew += applyTSDB(tsdb.events, seen); // redundancy / fallback
          if (!espn){ // only trust TheSportsDB for completeness if ESPN was unavailable
            dayHadEvents = true;
            var played = tsdb.events.filter(function(e){
              return e.intHomeScore != null && e.intHomeScore !== "" &&
                     e.intAwayScore != null && e.intAwayScore !== "";
            });
            if (played.length < tsdb.events.length) dayAllPlayed = false;
          }
        }

        if (dayHadEvents){
          if (!dayAllPlayed){ return done(); } // reached the live front
          lastFullDay = date;                  // a fully-played day
        }
        date = addDays(date, 1);
        step();
      }).catch(fail);
    }
    function done(){
      if (lastFullDay) localStorage.setItem("tsdb_last_date", lastFullDay);
      state.matches = initialMatches();
      saveState();
      rerender();
      var srcList = [];
      if (sources.espn) srcList.push("ESPN");
      if (sources.tsdb) srcList.push("TheSportsDB");
      var srcTxt = srcList.length ? (" via " + srcList.join(" + ")) : "";
      fetchStatus.textContent = totalNew > 0
        ? ("Updated " + totalNew + " played game" + (totalNew === 1 ? "" : "s") +
           " across " + daysFetched + " day" + (daysFetched === 1 ? "" : "s") + srcTxt + ".")
        : ("No new played games found (kept saved results)" + srcTxt + ".");
      fetchBtn.disabled = false;
    }
    function fail(err){
      var hint = /429/.test(err.message) ? " (rate-limited \u2014 try again shortly)" : "";
      fetchStatus.textContent = "Live fetch failed (" + err.message + ")" + hint +
                                " \u2014 keeping saved results.";
      fetchBtn.disabled = false;
    }
    step();
  }
  fetchBtn.addEventListener("click", fetchLatest);

  render();
})();
</script>
</body>
</html>
